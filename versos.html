// ============ GERENCIAR TABS ============
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tabName = btn.dataset.tab;
    
    // Remover active de todos
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    
    // Adicionar active ao selecionado
    btn.classList.add('active');
    document.getElementById(tabName).classList.add('active');
  });
});

// ============ FRASE DO DIA ============
function getVerseOfDay() {
  const today = new Date().toDateString();
  const stored = localStorage.getItem('verseOfDay');
  
  if (stored) {
    const data = JSON.parse(stored);
    if (data.date === today) {
      return data.verse;
    }
  }
  
  // Gerar novo versículo para o dia
  const allVerses = [];
  for (const book in versesData) {
    const chapters = versesData[book].chapters;
    for (const chap in chapters) {
      chapters[chap].forEach(v => {
        allVerses.push({
          text: v.text,
          ref: `${book} ${chap}:${v.num}`,
          bookCover: versesData[book].cover
        });
      });
    }
  }
  
  const dayNumber = Math.floor(Date.now() / (1000 * 60 * 60 * 24));
  const verse = allVerses[dayNumber % allVerses.length];
  
  // Guardar no localStorage
  localStorage.setItem('verseOfDay', JSON.stringify({ date: today, verse }));
  
  return verse;
}

function displayVerseOfDay() {
  const verse = getVerseOfDay();
  document.getElementById('verseOfDayText').textContent = `"${verse.text}"`;
  document.getElementById('verseOfDayRef').textContent = verse.ref;
  
  // Guardar versículo atual para partilha
  window.currentVerse = verse;
}

// ============ EXIBIR VERSÍCULOS ============
function displayVerses() {
  const container = document.getElementById('versesContainer');
  container.innerHTML = '';
  
  for (const bookName in versesData) {
    const book = versesData[bookName];
    const bookDiv = document.createElement('div');
    bookDiv.className = 'book-section';
    
    // Header do livro
    const headerDiv = document.createElement('div');
    headerDiv.className = 'book-header';
    headerDiv.innerHTML = `
      <img src="${book.cover}" alt="Capa de ${bookName}" loading="lazy">
      <h3>${bookName}</h3>
    `;
    bookDiv.appendChild(headerDiv);
    
    // Lista de capítulos
    const chapsDiv = document.createElement('div');
    chapsDiv.className = 'chapters-list';
    
    for (const chap in book.chapters) {
      const btn = document.createElement('button');
      btn.className = 'chapter-btn';
      btn.textContent = `Capítulo ${chap}`;
      btn.addEventListener('click', () => displayChapterVerses(bookName, chap));
      chapsDiv.appendChild(btn);
    }
    
    bookDiv.appendChild(chapsDiv);
    container.appendChild(bookDiv);
  }
}

function displayChapterVerses(bookName, chapter) {
  // Ir para a tab de versículos se não está lá
  document.querySelector('[data-tab="verses"]').click();
  
  // Scroll para o topo
  window.scrollTo(0, 0);
  
  const book = versesData[bookName];
  const verses = book.chapters[chapter];
  
  const container = document.getElementById('versesContainer');
  container.innerHTML = `
    <div class="verses-display">
      <div class="verses-header">
        <h3>${bookName}</h3>
        <p>Capítulo ${chapter}</p>
      </div>
  `;
  
  const display = container.querySelector('.verses-display');
  
  verses.forEach(verse => {
    const verseDiv = document.createElement('div');
    verseDiv.className = 'verse-item';
    verseDiv.innerHTML = `
      <div class="verse-ref">${bookName} ${chapter}:${verse.num}</div>
      <div class="verse-text">"${verse.text}"</div>
      <div class="verse-actions">
        <button class="verse-action-btn" onclick="copyVerseText('${verse.text.replace(/'/g, "\\'")}')">Copiar</button>
        <button class="verse-action-btn" onclick="shareVerse('${verse.text.replace(/'/g, "\\'")}', '${bookName} ${chapter}:${verse.num}')">Partilhar</button>
      </div>
    `;
    display.appendChild(verseDiv);
  });
  
  display.innerHTML += '</div>';
}

// ============ COPIAR E PARTILHAR VERSÍCULOS ============
window.copyVerseText = function(text) {
  navigator.clipboard.writeText(`"${text}"`).then(() => {
    const feedback = document.getElementById('copyFeedback');
    feedback.classList.add('show');
    setTimeout(() => feedback.classList.remove('show'), 2000);
  });
};

window.shareVerse = function(text, ref) {
  const shareText = encodeURIComponent(`"${text}"\n\n— ${ref}\n\nDe Sacaita Montgomery`);
  
  // Menu de partilha
  const options = [
    { name: 'WhatsApp', url: `https://wa.me/?text=${shareText}` },
    { name: 'Twitter', url: `https://twitter.com/intent/tweet?text=${shareText}` },
    { name: 'Facebook', url: `https://www.facebook.com/sharer/sharer.php?quote=${shareText}` },
  ];
  
  const choice = prompt('Partilhar em:\n1 - WhatsApp\n2 - Twitter\n3 - Facebook\n4 - Copiar link');
  
  if (choice === '1') window.open(options[0].url, '_blank');
  else if (choice === '2') window.open(options[1].url, '_blank');
  else if (choice === '3') window.open(options[2].url, '_blank');
  else if (choice === '4') {
    navigator.clipboard.writeText(`"${text}"\n\n— ${ref}`);
    const feedback = document.getElementById('copyFeedback');
    feedback.classList.add('show');
    setTimeout(() => feedback.classList.remove('show'), 2000);
  }
};

// ============ PESQUISA ============
document.getElementById('searchInput').addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase();
  const results = document.getElementById('searchResults');
  
  if (query.length < 2) {
    results.innerHTML = '';
    return;
  }
  
  results.innerHTML = '';
  let found = 0;
  
  for (const bookName in versesData) {
    const book = versesData[bookName];
    for (const chap in book.chapters) {
      book.chapters[chap].forEach(verse => {
        if (verse.text.toLowerCase().includes(query)) {
          const verseDiv = document.createElement('div');
          verseDiv.className = 'verse-item';
          verseDiv.innerHTML = `
            <div class="verse-ref">${bookName} ${chap}:${verse.num}</div>
            <div class="verse-text">"${verse.text}"</div>
            <div class="verse-actions">
              <button class="verse-action-btn" onclick="copyVerseText('${verse.text.replace(/'/g, "\\'")}')">Copiar</button>
              <button class="verse-action-btn" onclick="shareVerse('${verse.text.replace(/'/g, "\\'")}', '${bookName} ${chap}:${verse.num}')">Partilhar</button>
            </div>
          `;
          results.appendChild(verseDiv);
          found++;
        }
      });
    }
  }
  
  if (found === 0) {
    results.innerHTML = '<p style="text-align:center;padding:20px;color:rgba(255,255,255,0.5);">Nenhum versículo encontrado.</p>';
  }
});

// ============ NOTIFICAÇÕES ============
function setupNotifications() {
  const bell = document.getElementById('notificationBell');
  const badge = document.getElementById('notificationBadge');
  const verse = getVerseOfDay();
  
  // Verificar se já foi visualizada hoje
  const today = new Date().toDateString();
  const viewed = localStorage.getItem('verseViewed');
  
  if (viewed !== today) {
    badge.textContent = '1';
    badge.classList.remove('hidden');
    
    bell.addEventListener('click', () => {
      // Mostrar a frase do dia
      document.querySelector('[data-tab="verse-of-day"]').click();
      
      // Marcar como visualizada
      localStorage.setItem('verseViewed', today);
      badge.classList.add('hidden');
      
      // Mostrar feedback
      const feedback = document.getElementById('copyFeedback');
      feedback.textContent = '✓ Frase do Dia visualizada!';
      feedback.classList.add('show');
      setTimeout(() => feedback.classList.remove('show'), 2000);
    });
  }
  
  // Notificação do navegador (se permitido)
  if ('Notification' in window && Notification.permission === 'granted') {
    // Apenas uma vez por dia
    if (viewed !== today) {
      new Notification('Frase do Dia', {
        body: verse.text,
        icon: 'favicon.png',
        tag: 'verse-of-day'
      });
    }
  }
}

// ============ INICIALIZAR ============
document.addEventListener('DOMContentLoaded', () => {
  displayVerseOfDay();
  displayVerses();
  setupNotifications();
  
  // Pedir permissão para notificações
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => {
      console.warn('Falha ao registar Service Worker:', err);
    });
  });
}
